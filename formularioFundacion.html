min-height: 100vh;

padding: 0px;
margin: 0;
}

.registro-container {
background: #fffef5;
border-radius: 20px;
box-shadow: 0 20px 50px rgba(0,0,0,0.15);
padding: 45px;
max-width: 750px;
width: 100%;
border: 3px solid #000000;
margin: 60px auto;
}

.btn-registro {
background: #ff8c00;
border: none;
color: white;
font-weight: 700;
padding: 15px;
font-size: 18px;
width: 100%;
border-radius: 10px;
}

.btn-registro:hover {
background: #e67600;
}
</style>
</head>

<body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">

    <a href="index.html" class="d-flex align-items-center text-decoration-none">
      <img src="img/logo.jpeg" alt="Logo" height="80" class="me-2" />
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <!-- MENÚ IZQUIERDA -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" href="formularioDonador.html">
            ¡Dona ahora!

        <li class="nav-item">
          <a class="nav-link active" href="formularioFundacion.html">
            ¡Registra tu fundación!
          </a>
        </li>
      </ul>

      <!-- BOTÓN DERECHA -->
      <a href="iniciarSesion.html" class="btn btn-primary">
        Iniciar Sesión
      </a>

    </div>

  </div>

<div class="registro-container">

<h2 class="text-center mb-3">Registro Fundacion / Organización</h2>
<p class="text-center text-muted">Red Solidaria</p>
<p class="text-center text-muted">"Ayuda a Transformar Vidas con tu Donaciones"</p>

<form class="row g-3">

<div class="col-md-6">
<label class="form-label">NIT de la Fundacion / organizacion*</label>
<input type="text" class="form-control" placeholder="900123456" required>
</div>

<div class="col-md-6">
<label class="form-label">Nombre de la Fundacion *</label>
<input type="text" class="form-control" placeholder="Nombre de la empresa" required>
</div>

<div class="col-md-6">
<label class="form-label">Representante Legal *</label>
<input type="text" class="form-control" placeholder="Nombre del representante" required>
</div>

<div class="col-md-6">
<label class="form-label">Correo Empresarial *</label>
<input type="email" class="form-control" placeholder="correo@empresa.com" required>
</div>

<div class="col-md-6">
<label class="form-label">Teléfono *</label>
<input type="text" class="form-control" placeholder="3001234567" required>
</div>

<div class="col-md-6">
<label class="form-label">Ciudad *</label>
<input type="text" class="form-control" placeholder="Ciudad donde resides" required>
</div>

<div class="col-12">
<label class="form-label">Dirección de la Fundacion *</label>
<input type="text" class="form-control" placeholder="Dirección completa" required>
</div>


<div class="col-12">
            <div class="form-check">
    <input class="form-check-input" type="checkbox" id="terminos" name="terminos" required>
    <label class="form-check-label" for="terminos">
        Acepto los <a href="#">Términos y Condiciones</a> y la <a href="#">Política de Privacidad</a>
    </label>
         </div>
        </div>
<div class="col-12 mt-4">
 <a href="home_fundacion1.html" class="btn btn-primary">
  Registrar Fundación
</a>
</div>

</form>

</div>
