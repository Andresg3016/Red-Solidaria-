{% extends "base.html" %}

{% block title %}Inicio{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow p-4 text-center">
                <h1 class="h2 fw-bold">Conecta donantes con fundaciones</h1>
                <p class="lead mb-0">Red Solidaria permite donar ropa y alimentos a quienes más lo necesitan.</p>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="carousel-wrapper shadow-lg rounded overflow-hidden">
                <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="{{ url_for('static', filename='img/donacion1.png') }}" class="d-block w-100 carousel-img" style="height:400px; object-fit:cover;" alt="1">
                        </div>
                        <div class="carousel-item">
                            <img src="{{ url_for('static', filename='img/donacion2.png') }}" class="d-block w-100 carousel-img" style="height:400px; object-fit:cover;" alt="2">
                        </div>
                        <div class="carousel-item">
                            <img src="{{ url_for('static', filename='img/donacion3.png') }}" class="d-block w-100 carousel-img" style="height:400px; object-fit:cover;" alt="3">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow p-4 text-center">
                <h2 class="h4">¿Quieres ayudar?</h2>
                <p class="small">Tu donación puede cambiar la vida de muchas personas.</p>
                <a href="{{ url_for('registro') }}" class="btn btn-success btn-lg w-30 mx-auto">Comenzar a donar</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
