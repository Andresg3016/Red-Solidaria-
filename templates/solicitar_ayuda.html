<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 Solicitar Ayuda - Red Solidaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/solicitar_ayuda.css" rel="stylesheet">
</head>


<body>
    <!-- Navbar igual al panel -->
    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm">
        <div class="container-fluid">
            <a href="index3.html" class="d-flex align-items-center text-decoration-none">
                <!-- Cambia el logo por esto -->
                <img src="../static/img/Logo.jpeg" alt="Logo Red Solidaria"
                     height="60" class="me-3 shadow-sm logo-responsive"
                      style="border-radius: 10px; max-width: 80px; height: auto;">


            <div class="d-flex gap-2">
               <a href="home_fundacion.html" class="btn btn-outline-success fw-bold">
                     🏛️ Panel Fundación
                </a>
               <a href="solicitar_ayuda.html" class="btn btn-outline-primary fw-bold btn-active">
                  📤 Solicitar Ayuda
                 </a>
                </div>


            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <button class="btn btn-outline-dark dropdown-toggle fw-bold" data-bs-toggle="dropdown">
                        👤 Fundacion
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li><a class="dropdown-item" href="perfil_usuario.html">👤 Ver perfil</a></li>
                        <li><a class="dropdown-item" href="editar_perfil_usuario.html">✏️ Editar perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <button class="dropdown-item text-danger fw-bold" onclick="cerrarSesion()">
                                🚪 Cerrar sesión
                            </button>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>


    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h1>📤 Solicitud de Ayuda</h1>
                <p>Red Solidaria - Completa tu solicitud y te ayudaremos</p>
            </div>

            
                  <form method="post" id="formPublicar">
                <div class="mb-4">
                    <label class="form-label">📦 Categoría del Recurso Necesitado</label>
                    <select name="tipo" class="form-select" required>
                        <option value="">Selecciona una categoría</option>
                        <option value="alimentos">🍚 Alimentos (Campaña Mensual)</option>
                        <option value="salud">🏥 Insumos Médicos</option>
                        <option value="infraestructura">👕 Ropa y Calzado</option>
                        <option value="fondos">💰 Colecta Económica</option>
                        <option value="otros">📦 Otros</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">🎯 Meta / Objetivo</label>
                    <input type="text" name="meta" class="form-control" placeholder="Ej: 100 kg de arroz o 50 frazadas" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">📝 Descripción Detallada</label>
                    <textarea name="descripcion" class="form-control" rows="5" 
                              placeholder="Describe por qué es urgente y cómo ayudará a la comunidad..." 
                              required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">📅 Fecha Límite de la Campaña</label>
                    <input type="date" name="fecha_limite" class="form-control">
                </div>


            

                <button type="submit" class="btn btn-submit w-100">
                    🚀 Enviar Solicitud de Ayuda
                </button>
            </form>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   
    <script>
        function cerrarSesion() {
            const confirmacion = confirm("¿Está seguro que desea finalizar su sesión actual?");
            if (confirmacion) {
                window.location.href = "iniciarSesion.html";
            }
        }


        // Manejo del formulario
        document.getElementById('formSolicitud').addEventListener('submit', function(e) {
            e.preventDefault();
           
            // Simulación de envío exitoso
            const btn = this.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
           
            btn.innerHTML = '✅ Enviando...';
            btn.disabled = true;
           
            setTimeout(() => {
                btn.innerHTML = '🎉 ¡Solicitud Enviada!';
                btn.style.background = 'linear-gradient(135deg, #28a745, #20c997)';
               
                setTimeout(() => {
                    alert('¡Tu solicitud ha sido enviada exitosamente!\nNuestro equipo la revisará en las próximas 24-48 horas.');
                    // Aquí iría el código real de envío al servidor
                    // this.submit();
                    window.location.href = 'panel_usuario.html';
                }, 2000);
            }, 2000);
        });


        // Efecto de scroll suave
        document.addEventListener('DOMContentLoaded', function() {
            console.log("Formulario de Solicitud de Ayuda - Red Solidaria Inicializado.");
        });
    </script>
</body>
</html>
