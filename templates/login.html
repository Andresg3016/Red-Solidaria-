<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Solidaria</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/login.css')}}" />
    
</head>
<body>

<header class="header">
    <div class="logo">
        <a href="{{ url_for('inicio') }}">
            <img src="{{url_for('static', filename='img/logo.jpeg')}}" alt="Logo">
        </a>
    </div>

    <input type="checkbox" id="menu-toggle" />
    <label for="menu-toggle" class="menu-icon">☰</label>

    <nav class="nav">
        <ul class="nav-links">
            <li><a href="{{url_for('registro')}}">¡Dona Ahora!</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">About us</a></li>
            <li>
                <a href="{{ url_for('login') }}" class="btn-link">Iniciar Sesión</a>
            </li>
        </ul>
    </nav>
</header>

<!-- NUEVO CONTENEDOR -->
<div class="main">
    <div class="formulario">
    <h1>Inicio de Sesión</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="color: #721c24; 
                      background-color: #f8d7da; 
                      border: 1px solid #f5c6cb;
                      padding: 12px; 
                      border-radius: 8px; 
                      margin-bottom: 20px; 
                      text-align: center; 
                      box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
                      font-weight: bold;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
        <div class="email">
            <input type="email" name="correo" placeholder="Correo electrónico" required>
        </div>
        <div class="email">
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>
        <div class="registrarse">
            Quiero hacer el <a href="{{url_for('registro')}}">registro</a>
        </div>
    </form>
</div>

</body>
</html>
