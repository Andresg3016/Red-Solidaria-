<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Solidaria - {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/solicitar_ayuda.css') }}" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block head %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="{{ url_for('inicio') }}"><img src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="Logo Red Solidaria" /></a>
        </div>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">☰</label>
        <nav class="nav">
            <ul class="nav-links">
                <li><a href="{{ url_for('registro') }}">¡Dona Ahora!</a></li>
                <li class="mobile-btn"><a href="{{ url_for('login') }}" class="btn-link">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 70px;">
        {% block content %}{% endblock %}
    </main>

    <footer style="background-color: #1a1a1a; color: white; text-align: center; padding: 20px 20px; margin-top: 50px; border-top: 4px solid #63ff5e;">
        <p>© 2026 Red Solidaria</p>
        <p>Conectando solidaridad con quienes más lo necesitan</p>
        <p>Contacto de Soporte: <a href="mailto:soporte@redsolidaria.com" style="color: #63ff5e;">soporte@redsolidaria.com</a></p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
